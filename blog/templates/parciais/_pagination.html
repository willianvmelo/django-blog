<!-- Pagination-->
<nav aria-label="Page navigation example">
  <ul class="pagination">
    {% for page in pages.paginator.page_range%} 
        {% if pages.number == page %}
          <li class="page-item active">
          <a class="page-link" href="?page={{page}}">{{page}}</a>
          </li>
        {%else%}
          <li class="page-item">
          <a class="page-link" href="?page={{page}}">{{page}}</a>
          </li>
        {%endif%}
    {%endfor%}
  </ul>
</nav>
